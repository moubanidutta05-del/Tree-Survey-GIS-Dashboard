<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tree Survey GIS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0d1b2a;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#header {
  background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid #2ecc71;
  flex-shrink: 0;
}

#header h1 {
  font-size: 18px;
  font-weight: 700;
  color: #2ecc71;
  letter-spacing: 1px;
  text-transform: uppercase;
}

#header .subtitle {
  font-size: 11px;
  color: #90b8d4;
  margin-top: 2px;
}

#stats-bar {
  display: flex;
  gap: 8px;
  align-items: center;
}

.stat-pill {
  background: rgba(46,204,113,0.15);
  border: 1px solid rgba(46,204,113,0.4);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: #2ecc71;
  white-space: nowrap;
}

.stat-pill span {
  font-weight: 700;
  font-size: 13px;
}

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#map-container {
  flex: 1;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
}

#sidebar {
  width: 280px;
  background: #0d1b2a;
  border-left: 2px solid #1a3a5c;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-section {
  padding: 12px;
  border-bottom: 1px solid #1a3a5c;
}

.sidebar-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #2ecc71;
  margin-bottom: 10px;
  font-weight: 600;
}

/* LEGEND */
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  color: #c8dde9;
}

.legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}

.legend-section-title {
  font-size: 10px;
  color: #6a8fa0;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 8px 0 5px;
  font-weight: 600;
}

/* PIE CHART */
#pie-container {
  position: relative;
  width: 100%;
  max-width: 220px;
  margin: 0 auto;
}

#pieChart {
  width: 100% !important;
}

#pie-labels {
  margin-top: 8px;
}

.pie-label-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
  font-size: 11px;
}

.pie-label-color {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

.pie-label-name {
  flex: 1;
  color: #a8c8da;
  margin: 0 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pie-label-count {
  color: #fff;
  font-weight: 600;
  font-size: 10px;
}

/* NORTH ARROW on map */
.north-arrow-control {
  background: rgba(13,27,42,0.92);
  border: 1px solid #1a3a5c;
  border-radius: 6px;
  padding: 6px 8px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.north-arrow-svg {
  display: block;
  margin: 0 auto;
}

.north-label {
  color: #2ecc71;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* Leaflet overrides */
.leaflet-control-scale-line {
  background: rgba(13,27,42,0.85) !important;
  border-color: #2ecc71 !important;
  color: #2ecc71 !important;
  font-size: 10px !important;
  font-weight: 600 !important;
}

.leaflet-control-zoom a {
  background: rgba(13,27,42,0.92) !important;
  color: #2ecc71 !important;
  border-color: #1a3a5c !important;
}

.leaflet-popup-content-wrapper {
  background: #0d2137 !important;
  color: #c8dde9 !important;
  border: 1px solid #2ecc71 !important;
  border-radius: 8px !important;
  font-size: 12px !important;
}

.leaflet-popup-tip {
  background: #0d2137 !important;
}

.leaflet-popup-content b {
  color: #2ecc71;
}

/* Health badge in popup */
.health-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 11px;
}

.health-Healthy { background: rgba(46,204,113,0.25); color: #2ecc71; }
.health-Dead    { background: rgba(231,76,60,0.25);  color: #e74c3c; }
.health-Diseased{ background: rgba(230,126,34,0.25); color: #e67e22; }
.health-Damaged { background: rgba(241,196,15,0.25); color: #f1c40f; }
</style>
</head>

<div id="header">
  <div>
    <h1>🌳 Tree Survey GIS Dashboard</h1>
    <div class="subtitle">Pimpri-Chinchwad Municipal Area · Urban Tree Inventory</div>
  </div>
  <div id="stats-bar">

<div id="main">

  </div>

  <div id="sidebar">

    <div class="sidebar-section">

      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>Dead</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>Diseased</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f1c40f"></div>Damaged</div>

      <div class="legend-section-title" style="margin-top:12px">Height Class</div>
      <div class="legend-item">
        <svg width="14" height="14"><circle cx="7" cy="7" r="3" fill="#90b8d4"/></svg>
        &lt; 10 m (Small)
      </div>
      <div class="legend-item">
        <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#90b8d4"/></svg>
        10 – 20 m (Medium)
      </div>
      <div class="legend-item">
        <svg width="14" height="14"><circle cx="7" cy="7" r="7" fill="#90b8d4"/></svg>
        &gt; 20 m (Tall)
      </div>
    </div>

    <!-- PIE CHART -->
    <div class="sidebar-section">
      <h3>📊 Tree Frequency by Species</h3>
      <div id="pie-container">
        <canvas id="pieChart"></canvas>
      </div>
      <div id="pie-labels"></div>
    </div>

    <!-- HEALTH SUMMARY -->
    <div class="sidebar-section">
      <h3>🏥 Health Summary</h3>
      <div id="health-bars"></div>
    </div>
  </div>
</div>

// ─── HELPER FUNCTIONS ─────────────────────────────────────────────────────────
function healthColor(h) {
  switch(h) {
    case 'Healthy':  return '#2ecc71';
    case 'Dead':     return '#e74c3c';
    case 'Diseased': return '#e67e22';
    case 'Damaged':  return '#f1c40f';
    default:         return '#90b8d4';
  }
}

function heightRadius(h) {
  if (h === 'Less Than 10 m') return 5;
  if (h === '10 - 20 m')      return 7;
  return 9;
}

// ─── MAP INIT ─────────────────────────────────────────────────────────────────
var map = L.map('map', { zoomControl: true }).setView([18.458, 73.853], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

// ─── GeoJSON LAYER ────────────────────────────────────────────────────────────
var geoFeatures = data.map(function(f) { return f; });

var layer = L.geoJSON({type:'FeatureCollection', features: geoFeatures}, {
  pointToLayer: function(feature, latlng) {
    var p = feature.properties;
    var color = healthColor(p.Health);
    var radius = heightRadius(p.Height);
    return L.circleMarker(latlng, {
      radius: radius,
      fillColor: color,
      color: 'rgba(255,255,255,0.4)',
      weight: 1,
      opacity: 1,
      fillOpacity: 0.85
    });
  },
  onEachFeature: function(feature, layer) {
    var p = feature.properties;
    var name = p.TreeName || '<i>Unknown species</i>';
    var badgeClass = 'health-' + p.Health;
    layer.bindPopup(
      '<b>' + name + '</b><br>' +
      '<b style="color:#90b8d4">Tree ID:</b> ' + p.TreeID + '<br>' +
      '<b style="color:#90b8d4">Height:</b> ' + p.Height + '<br>' +
      '<b style="color:#90b8d4">Health:</b> <span class="health-badge ' + badgeClass + '">' + p.Health + '</span>'
    );
  }
}).addTo(map);

map.fitBounds(layer.getBounds());

// ─── SCALE BAR ────────────────────────────────────────────────────────────────
L.control.scale({ imperial: false, metric: true, position: 'bottomleft' }).addTo(map);

// ─── NORTH ARROW ──────────────────────────────────────────────────────────────
var NorthArrow = L.Control.extend({
  options: { position: 'topleft' },
  onAdd: function() {
    var div = L.DomUtil.create('div', 'north-arrow-control');
    div.innerHTML = `
      <svg class="north-arrow-svg" width="36" height="52" viewBox="0 0 36 52">
        <defs>
          <linearGradient id="na1" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#2ecc71"/>
            <stop offset="100%" stop-color="#1abc9c"/>
          </linearGradient>
        </defs>
        <!-- North half (filled) -->
        <polygon points="18,4 28,32 18,26 8,32" fill="url(#na1)" opacity="0.95"/>
        <!-- South half (outline) -->
        <polygon points="18,48 28,32 18,26 8,32" fill="#1a3a5c" stroke="#2ecc71" stroke-width="1"/>
        <!-- Center dot -->
        <circle cx="18" cy="28" r="3" fill="#fff"/>
        <!-- N label -->
        <text x="18" y="18" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="Arial">N</text>
      </svg>
      <div class="north-label">NORTH</div>`;
    return div;
  }
});
new NorthArrow().addTo(map);

// ─── STATS ────────────────────────────────────────────────────────────────────
var healthCount = {Healthy:0, Dead:0, Diseased:0, Damaged:0};
var speciesCount = {};
var total = data.length;

data.forEach(function(f) {
  var p = f.properties;
  var h = p.Health;
  if (healthCount[h] !== undefined) healthCount[h]++;
  var name = p.TreeName ? p.TreeName.trim() : '';
  if (name === '') name = 'Unknown';
  speciesCount[name] = (speciesCount[name] || 0) + 1;
});

var atRisk = healthCount.Dead + healthCount.Diseased + healthCount.Damaged;
var speciesNames = Object.keys(speciesCount).filter(function(k){ return k!=='Unknown'; });

document.getElementById('total-count').textContent   = total;
document.getElementById('healthy-count').textContent = healthCount.Healthy;
document.getElementById('risk-count').textContent    = atRisk;
document.getElementById('species-count').textContent = speciesNames.length;

// ─── PIE CHART ────────────────────────────────────────────────────────────────
var sortedSpecies = Object.entries(speciesCount)
  .filter(function(e){ return e[0] !== 'Unknown'; })
  .sort(function(a,b){ return b[1]-a[1]; });

var top10 = sortedSpecies.slice(0, 10);
var othersCount = sortedSpecies.slice(10).reduce(function(s,e){ return s+e[1]; }, 0);
if (othersCount > 0) top10.push(['Others', othersCount]);

var pieColors = [
  '#2ecc71','#3498db','#e74c3c','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#e91e63','#00bcd4','#ff5722','#607d8b'
];

var pieCtx = document.getElementById('pieChart').getContext('2d');
new Chart(pieCtx, {
  type: 'doughnut',
  data: {
    labels: top10.map(function(e){ return e[0]; }),
    datasets: [{
      data: top10.map(function(e){ return e[1]; }),
      backgroundColor: pieColors,
      borderColor: '#0d1b2a',
      borderWidth: 2
    }]
  },
  options: {
    responsive: true,
    cutout: '60%',
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#0d2137',
        titleColor: '#2ecc71',
        bodyColor: '#c8dde9',
        borderColor: '#2ecc71',
        borderWidth: 1,
        callbacks: {
          label: function(ctx) {
            var pct = ((ctx.parsed / total)*100).toFixed(1);
            return ' ' + ctx.parsed + ' trees (' + pct + '%)';
          }
        }
      }
    }
  }
});

// Pie labels
var labelsHTML = '';
top10.forEach(function(e, i) {
  var pct = ((e[1]/total)*100).toFixed(1);
  labelsHTML += `<div class="pie-label-item">
    <div class="pie-label-color" style="background:${pieColors[i]}"></div>
    <span class="pie-label-name" title="${e[0]}">${e[0]}</span>
    <span class="pie-label-count">${e[1]} (${pct}%)</span>
  </div>`;
});
document.getElementById('pie-labels').innerHTML = labelsHTML;

// ─── HEALTH BARS ──────────────────────────────────────────────────────────────
var healthBarsHTML = '';
var healthItems = [
  {name:'Healthy',  color:'#2ecc71', count: healthCount.Healthy},
  {name:'Diseased', color:'#e67e22', count: healthCount.Diseased},
  {name:'Damaged',  color:'#f1c40f', count: healthCount.Damaged},
  {name:'Dead',     color:'#e74c3c', count: healthCount.Dead}
];
healthItems.forEach(function(item) {
  var pct = ((item.count/total)*100).toFixed(1);
  healthBarsHTML += `
  <div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#a8c8da;margin-bottom:3px">
      <span>${item.name}</span>
      <span style="color:#fff;font-weight:600">${item.count} (${pct}%)</span>
    </div>
    <div style="background:#1a3a5c;border-radius:4px;height:6px;overflow:hidden">
      <div style="width:${pct}%;background:${item.color};height:100%;border-radius:4px;transition:width 1s"></div>
    </div>
  </div>`;
});
document.getElementById('health-bars').innerHTML = healthBarsHTML;

</script>
</body>
